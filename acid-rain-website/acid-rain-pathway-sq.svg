  <g font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#201b1f" font-weight="800">
    <rect x="70" y="742" width="430" height="112" rx="10" fill="#fff" opacity=".92"/>
    <text x="92" y="778">1. Burime ndotjeje</text>
    <text x="92" y="812" font-size="21" font-weight="700">SO₂ dhe NOx nga transporti,</text>
    <text x="92" y="840" font-size="21" font-weight="700">fabrikat dhe termocentralet</text>
    <rect x="525" y="742" width="420" height="112" rx="10" fill="#fff" opacity=".92"/>
    <text x="545" y="778">2. Reaksion në ajër</text>
    <text x="545" y="812" font-size="21" font-weight="700">Gazrat përzihen me ujë</text>
    <text x="545" y="840" font-size="21" font-weight="700">dhe kthehen në acide</text>
    <rect x="970" y="742" width="300" height="112" rx="10" fill="#fff" opacity=".92"/>
    <text x="990" y="778">3. Reshje acide</text>
    <text x="990" y="812" font-size="21" font-weight="700">Shi, borë, mjegull</text>
    <text x="990" y="840" font-size="21" font-weight="700">ose grimca të thata</text>
    <rect x="1300" y="742" width="245" height="112" rx="10" fill="#fff" opacity=".92"/>
    <text x="1320" y="778">4. Dëme</text>
    <text x="1320" y="812" font-size="21" font-weight="700">Ujë, tokë, pyje,</text>
    <text x="1320" y="840" font-size="21" font-weight="700">ndërtesa, shëndet</text>
  </g>
